<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder | AI-Powered Resume Builder</title>
    <meta name="description" content="Build your professional resume with AI-powered suggestions and modern templates. Easy-to-use interface with real-time preview.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/builder.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="container flex justify-between items-center">
                <a href="index.html" class="nav-brand">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/>
                        <polyline points="14,2 14,8 20,8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10,9 9,9 8,9"/>
                    </svg>
                    ResumeBuilder AI
                </a>
                
                <div class="builder-actions">
                    <button id="autoSaveToggle" class="btn btn-secondary">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                        </svg>
                        Auto-save: ON
                    </button>
                    <button id="previewBtn" class="btn btn-outline">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        Preview
                    </button>
                    <button id="downloadBtn" class="btn btn-primary">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        Download
                    </button>
                </div>
                
                <button class="mobile-menu-button" id="mobileMenuButton" aria-label="Toggle menu">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </nav>
    </header>

    <main class="builder-main">
        <!-- Sidebar -->
        <aside class="builder-sidebar">
            <div class="sidebar-header">
                <h2>Build Your Resume</h2>
                <div class="progress-indicator">
                    <span class="progress-text">Progress: <span id="progressPercent">0%</span></span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="nav-sections">
                    <li>
                        <button class="nav-section active" data-section="personal">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            Personal Information
                            <span class="completion-indicator" id="personal-indicator"></span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-section" data-section="summary">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            Professional Summary
                            <span class="completion-indicator" id="summary-indicator"></span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-section" data-section="experience">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2-2v2m8 0H8m8 0v2a2 2 0 01-2 2H10a2 2 0 01-2-2V6"/>
                            </svg>
                            Work Experience
                            <span class="completion-indicator" id="experience-indicator"></span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-section" data-section="education">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
                            </svg>
                            Education
                            <span class="completion-indicator" id="education-indicator"></span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-section" data-section="skills">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                            </svg>
                            Skills
                            <span class="completion-indicator" id="skills-indicator"></span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-section" data-section="achievements">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
                            </svg>
                            Achievements
                            <span class="completion-indicator" id="achievements-indicator"></span>
                        </button>
                    </li>
                </ul>
            </nav>
            
            <div class="ai-assistant">
                <div class="ai-header">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                    AI Assistant
                </div>
                <div class="ai-suggestions" id="aiSuggestions">
                    <p>Complete your personal information to get AI-powered suggestions!</p>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <section class="builder-content">
            <div class="content-header">
                <h1 id="sectionTitle">Personal Information</h1>
                <div class="content-actions">
                    <button id="aiSuggestBtn" class="btn btn-outline">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                        Get AI Suggestions
                    </button>
                </div>
            </div>

            <div class="form-container">
                <!-- Personal Information Section -->
                <div id="personal-section" class="section-content active">
                    <form id="personalForm" class="resume-form">
                        <div class="grid grid-cols-2">
                            <div class="form-group">
                                <label for="firstName" class="form-label">First Name *</label>
                                <input type="text" id="firstName" name="firstName" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName" class="form-label">Last Name *</label>
                                <input type="text" id="lastName" name="lastName" class="form-input" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address *</label>
                            <input type="email" id="email" name="email" class="form-input" required>
                        </div>
                        
                        <div class="grid grid-cols-2">
                            <div class="form-group">
                                <label for="phone" class="form-label">Phone Number</label>
                                <input type="tel" id="phone" name="phone" class="form-input">
                            </div>
                            <div class="form-group">
                                <label for="location" class="form-label">Location</label>
                                <input type="text" id="location" name="location" class="form-input" placeholder="City, State">
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2">
                            <div class="form-group">
                                <label for="linkedin" class="form-label">LinkedIn Profile</label>
                                <input type="url" id="linkedin" name="linkedin" class="form-input" placeholder="https://linkedin.com/in/username">
                            </div>
                            <div class="form-group">
                                <label for="website" class="form-label">Personal Website</label>
                                <input type="url" id="website" name="website" class="form-input" placeholder="https://yourwebsite.com">
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Summary Section -->
                <div id="summary-section" class="section-content">
                    <form id="summaryForm" class="resume-form">
                        <div class="form-group">
                            <label for="jobTitle" class="form-label">Current/Target Job Title</label>
                            <input type="text" id="jobTitle" name="jobTitle" class="form-input" placeholder="e.g., Senior Software Engineer">
                        </div>
                        
                        <div class="form-group">
                            <label for="summary" class="form-label">Professional Summary</label>
                            <textarea id="summary" name="summary" class="form-input form-textarea" rows="6" placeholder="Write a compelling summary that highlights your key qualifications and career objectives..."></textarea>
                            <div class="field-help">
                                <span class="character-count">0 / 300 characters</span>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Experience Section -->
                <div id="experience-section" class="section-content">
                    <div class="section-header">
                        <h3>Work Experience</h3>
                        <button id="addExperienceBtn" class="btn btn-outline">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Add Experience
                        </button>
                    </div>
                    <div id="experienceContainer" class="dynamic-container">
                        <!-- Experience items will be added here -->
                    </div>
                </div>

                <!-- Education Section -->
                <div id="education-section" class="section-content">
                    <div class="section-header">
                        <h3>Education</h3>
                        <button id="addEducationBtn" class="btn btn-outline">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Add Education
                        </button>
                    </div>
                    <div id="educationContainer" class="dynamic-container">
                        <!-- Education items will be added here -->
                    </div>
                </div>

                <!-- Skills Section -->
                <div id="skills-section" class="section-content">
                    <form id="skillsForm" class="resume-form">
                        <div class="form-group">
                            <label for="skillInput" class="form-label">Add Skills</label>
                            <div class="skill-input-container">
                                <input type="text" id="skillInput" class="form-input" placeholder="Type a skill and press Enter">
                                <button type="button" id="addSkillBtn" class="btn btn-secondary">Add</button>
                            </div>
                        </div>
                        
                        <div class="skills-container" id="skillsContainer">
                            <!-- Skills will be added here -->
                        </div>
                    </form>
                </div>

                <!-- Achievements Section -->
                <div id="achievements-section" class="section-content">
                    <div class="section-header">
                        <h3>Achievements & Certifications</h3>
                        <button id="addAchievementBtn" class="btn btn-outline">
                            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Add Achievement
                        </button>
                    </div>
                    <div id="achievementsContainer" class="dynamic-container">
                        <!-- Achievement items will be added here -->
                    </div>
                </div>
            </div>

            <!-- Navigation Footer -->
            <div class="section-navigation">
                <button id="prevSectionBtn" class="btn btn-secondary" disabled>
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Previous
                </button>
                <button id="nextSectionBtn" class="btn btn-primary">
                    Next
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/builder.js"></script>
</body>
</html>
